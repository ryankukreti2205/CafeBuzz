<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page - CafeBuzz</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <form onsubmit="login(event)">
    <h2 align="center">Log in on CafeBuzz</h2>

    <div class="logo">
      <a href="index.html" class="logo-link">
        <img
          src="images/logo.png"
          alt="CafeBuzz Logo"
          style="display: block; margin: 0 auto; width: 100px; height: 100px;"
        />
      </a>
    </div>
    <br /><br />

    <div class="container" align="center">
      <label for="email">E-mail:</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        placeholder="abc@gmail.com"
      /><br />

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required /><br />

      <button type="submit" id="mysubmit">Login</button>

      <p style="margin-top: 10px">
        Don’t have an account?
        <a href="register.html">Register here</a>
      </p>
    </div>
  </form>

  <script>
    async function login(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("⚠️ Please fill in both fields.");
        return;
      }

      try {
        const response = await fetch("http://127.0.0.1:5000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          // Save user info and token locally
          localStorage.setItem("cafebuzz_user", data.name);
          localStorage.setItem("cafebuzz_token", data.token);

          alert(`Welcome back, ${data.name}!`);
          window.location.href = "dashboard.html";
        } else {
          alert(`⚠️ ${data.message}`);
        }
      } catch (err) {
        alert("⚠️ Unable to connect to server. Make sure the backend is running.");
        console.error("Error:", err);
      }
    }
  </script>
</body>
</html>
