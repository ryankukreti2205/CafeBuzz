<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - CafeBuzz</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <form onsubmit="registerUser(event)">
    <h2 align="center">Register on CafeBuzz</h2>

    <div class="logo">
      <a href="index.html" class="logo-link">
        <img
          src="images/logo.png"
          alt="CafeBuzz Logo"
          style="display: block; margin: 0 auto; width: 100px; height: 100px"
        />
      </a>
    </div>
    <br /><br />

    <div class="container" align="center">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required /><br />

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required placeholder="abc@gmail.com" /><br />

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required /><br />

      <button type="submit" id="mysubmit">Register</button>

      <p style="margin-top: 10px">
        Already have an account?
        <a href="login.html">Login here</a>
      </p>
    </div>
  </form>

  <script>
    async function registerUser(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("http://127.0.0.1:5000/register", {

          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          alert("✅ Registration successful!");
          window.location.href = "login.html";
        } else {
          alert("⚠️ " + data.message);
        }
      } catch (err) {
        console.error("Error:", err);
        alert("❌ Could not connect to the server. Make sure backend is running!");
      }
    }
  </script>
</body>
</html>
